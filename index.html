<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2196F3">
    <title>ChatBot 🤖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f 0%, #2d2d44 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
        }

        /* SPLASH SCREEN */
        #splash {
            position: fixed;
            width: 100%;
            height: 200%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00f2ff;
            font-size: 32px;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #splash.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        #splash h1 {
            animation: glow 1.5s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #00f2ff; }
            to { text-shadow: 0 0 30px #00f2ff, 0 0 50px #00f2ff; }
        }

        .chat-container {
            width: 90%;
            max-width: 500px;
            height: 80vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        .chat-container.dark-mode {
            background: #1e1e2e;
        }

        /* Header */
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Dark Mode Button */
        .dark-mode-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 8px 16px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s;
        }

        .dark-mode-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* Messages Area */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f7fb;
            transition: background 0.3s ease;
        }

        .chat-container.dark-mode .messages {
            background: #151521;
        }

        .message {
            margin-bottom: 15px;
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .bot {
            background: white;
            color: #333;
            margin-right: auto;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: background 0.3s ease, color 0.3s ease;
        }

        .chat-container.dark-mode .bot {
            background: #2d2d44;
            color: #e0e0e0;
        }

        /* Typing Animation */
        .typing {
            display: flex;
            gap: 5px;
            padding: 5px 0;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .chat-container.dark-mode .typing span {
            background: #aaa;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* Quick Buttons - 6 BUTTONS */
        .quick-buttons {
            padding: 15px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            transition: background 0.3s ease;
        }

        .chat-container.dark-mode .quick-buttons {
            background: #1e1e2e;
            border-top: 1px solid #444;
        }

        .quick-btn {
            padding: 10px 15px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            flex: 1;
            min-width: 90px;
        }

        .joke-btn {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            color: #333;
        }

        .help-btn {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #333;
        }

        .roast-btn {
            background: linear-gradient(135deg, #f43f5e 0%, #fb7185 100%);
            color: white;
        }

        .savage-btn {
            background: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);
            color: white;
        }

        .date-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #333;
        }

        .time-btn {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: #333;
        }

        .quick-btn:hover {
            transform: scale(1.05);
        }

        .quick-btn:active {
            transform: scale(0.95);
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            transition: background 0.3s ease;
        }

        .chat-container.dark-mode .input-area {
            background: #1e1e2e;
            border-top: 1px solid #444;
        }

        #input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }

        #input:focus {
            border-color: #667eea;
        }

        .chat-container.dark-mode #input {
            background: #2d2d44;
            border-color: #444;
            color: white;
        }

        .chat-container.dark-mode #input::placeholder {
            color: #888;
        }

        #send {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #send:hover {
            transform: scale(1.05);
        }

        #send:active {
            transform: scale(0.95);
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            .chat-container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }
            .message {
                max-width: 85%;
            }
            .quick-btn {
                min-width: calc(33.33% - 10px);
            }
            #splash h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body id="body">
    <!-- SPLASH SCREEN -->
    <div id="splash">
        <h1>Made by AARAV🤖</h1>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <div>
                <h2>ChatBot 🤖</h2>
                <p>Made by Aarav</p>
            </div>
            <button class="dark-mode-btn" id="darkModeBtn">
                <span id="darkIcon">🌙</span>
                <span id="darkText">Dark</span>
            </button>
        </div>

        <div id="messages" class="messages">
            <!-- Messages appear here -->
        </div>

        <!-- 6 BUTTONS: JOKE, HELP, ROAST, SAVAGE, DATE, TIME -->
        <div class="quick-buttons">
            <button class="quick-btn joke-btn" onclick="sendQuickMessage('tell me a joke')">😂 JOKE</button>
            <button class="quick-btn help-btn" onclick="sendQuickMessage('help me')">🆘 HELP</button>
            <button class="quick-btn roast-btn" onclick="sendQuickMessage('roast me')">🔥 ROAST</button>
            <button class="quick-btn savage-btn" onclick="sendQuickMessage('savage')">😈 SAVAGE</button>
            <button class="quick-btn date-btn" onclick="sendQuickMessage('date')">📅 DATE</button>
            <button class="quick-btn time-btn" onclick="sendQuickMessage('time')">⏰ TIME</button>
        </div>

        <div class="input-area">
            <input type="text" id="input" placeholder="Type your message or math problem (e.g., 2+2)..." autocomplete="off">
            <button id="send">Send</button>
        </div>
    </div>

    <script>
        // ===== SPLASH SCREEN =====
        window.onload = function() {
            setTimeout(function() {
                document.getElementById("splash").classList.add('fade-out');
                setTimeout(function() {
                    document.getElementById("splash").style.display = "none";
                    // Show welcome message after splash
                    createMessage("Hello! I am ChatBot 🤖", "bot");
                }, 500);
            }, 2500);
        };

        // ===== DARK MODE FUNCTION =====
        function toggleDarkMode() {
            const body = document.getElementById('body');
            const container = document.getElementById('chatContainer');
            const darkIcon = document.getElementById('darkIcon');
            const darkText = document.getElementById('darkText');
            
            body.classList.toggle('dark-mode');
            container.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                darkIcon.textContent = '☀️';
                darkText.textContent = 'Light';
                localStorage.setItem('darkMode', 'enabled');
            } else {
                darkIcon.textContent = '🌙';
                darkText.textContent = 'Dark';
                localStorage.setItem('darkMode', 'disabled');
            }
        }

        // ===== LOAD DARK MODE PREFERENCE =====
        function loadDarkMode() {
            if (localStorage.getItem('darkMode') === 'enabled') {
                document.getElementById('body').classList.add('dark-mode');
                document.getElementById('chatContainer').classList.add('dark-mode');
                document.getElementById('darkIcon').textContent = '☀️';
                document.getElementById('darkText').textContent = 'Light';
            }
        }

        // ===== ELEMENTS =====
        const messages = document.getElementById("messages");
        const input = document.getElementById("input");
        const send = document.getElementById("send");
        const darkModeBtn = document.getElementById("darkModeBtn");

        // ===== EVENT LISTENERS =====
        send.addEventListener("click", sendMessage);
        darkModeBtn.addEventListener("click", toggleDarkMode);
        
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        // Load dark mode preference
        loadDarkMode();

        // ===== QUICK MESSAGE FUNCTION =====
        function sendQuickMessage(text) {
            input.value = text;
            sendMessage();
        }

        // ===== SEND MESSAGE =====
        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            createMessage(text, "user");
            input.value = "";

            showTyping();

            setTimeout(() => {
                removeTyping();
                const reply = getBotReply(text);
                createMessage(reply, "bot");
            }, 1200);
        }

        // ===== CREATE MESSAGE =====
        function createMessage(text, sender) {
            const div = document.createElement("div");
            div.classList.add("message", sender);
            div.innerText = text;

            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        // ===== TYPING ANIMATION =====
        function showTyping() {
            const div = document.createElement("div");
            div.classList.add("message", "bot");
            div.id = "typing";

            div.innerHTML = `
                <div class="typing">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;

            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById("typing");
            if (typing) typing.remove();
        }

        // ===== BOT BRAIN =====
        function getBotReply(msg) {
            msg = msg.toLowerCase();

            // ===== MATH PROBLEM SOLVER =====
            try {
                if (/^[0-9+\-*/().%\s]+$/.test(msg) && 
                    (msg.includes('+') || msg.includes('-') || msg.includes('*') || msg.includes('/') || msg.includes('(') || msg.includes(')'))) {
                    
                    let result = Function('"use strict";return (' + msg + ')')();
                    
                    if (typeof result === 'number' && !isNaN(result)) {
                        return "🧮 " + msg + " = " + result;
                    }
                }
            } catch (error) {
                console.log("Math error:", error);
            }

            // ===== YOUR ORIGINAL RESPONSES =====
            if (msg.includes("i am sad") || msg.includes("i'm sad") || msg.includes("im sad"))
                return "Don't be sad ❤️ You are learning coding which is awesome 😎";
            
            if (msg.includes("hello") || msg.includes("hi"))
                return "Hi,i am chat bot how can i help you!";
            
            if (msg.includes("hi"))
                return "Hi,i am chat bot how can i help you!";

            if (msg.includes("yooo") || msg.includes("yo"))
                return "yooo, bro how are you 😊😊😊";

            if (msg.includes("your trash") || msg.includes("you're trash") || msg.includes("u trash"))
                return "Relax bro, your code was worse yesterday 💀😂";

            if (msg.includes("how are you"))
                return "I am good, how are you 💻";

            if (msg.includes("im fine thank you") || msg.includes("i'm fine thank you"))
                return "😀😀";
            
             if (msg.includes("wsp chat") || msg.includes("broo"))
                 return "yooo,my nigha shreyash";
   
            if (msg.includes("sing"))
                return "🎵 ninja ninja ninja ninja i am little monkey ninja";

            if (msg.includes("who is the best"))
                return "Obviously Aarav — he made me 😎🔥";

            if (msg.includes("what is your name") || msg.includes("your name"))
                return "I am chatBot 🤖";

            if (msg.includes("wow"))
                return "Wow indeed 😎🔥";

            if (msg.includes("are you black"))
                return "bruh 💀 im not black ur blackkk";

            if (msg.includes("who is your owner") || msg.includes("who made you"))
                return "Aarav Acharya is a cool teen who loves coding and building AI projects 🚀";

            if (msg.includes("who is the bosss") || msg.includes("who is the boss"))
                return "Aarav is the boss because he created me";

            if (msg.includes("your smart") || msg.includes("you're smart"))
                return "I learn from Aarav's code 😎🧠";

            if (msg.includes("dream"))
                return "Dream big, code bigger 🚀";

            // Homework Help
            if (msg.includes("homework"))
                return "Sure 😎 Tell me the subject — Math, Science, English, or others?";

            if (msg.includes("haha") || msg.includes("lol"))
                return "Glad you are laughing 😆🔥";

            if (msg.includes("math") && !msg.match(/[0-9+\-*/().%]/))
                return "For math → Try typing a problem like: 5+3, 10*2, (4+5)*2, etc. 🔢";

            if (msg.includes("science"))
                return "Science help 🧪: Ask me about physics, biology, or chemistry concepts";

            if (msg.includes("english"))
                return "English help 📖: I can help with grammar or meanings of words";

            if (msg.includes("what is ai"))
                return "AI means Artificial Intelligence — machines learning like humans 🧠";

            if (msg.includes("what is gravity"))
                return "Gravity is the force that pulls objects toward Earth 🌍";

            if (msg.includes("what is photosynthesis"))
                return "Photosynthesis is how plants make food using sunlight ☀️🌱";

            if (msg.includes("what is noun"))
                return "A noun is a name of a person, place, or thing 📚";

            if (msg.includes("you are stupid") || msg.includes("u stupid"))
                return "At least I don't write bugs like you 💀";

            // ===== BUTTON RESPONSES =====
            
            // ROAST button
            if (msg.includes("roast me") || msg.includes("roast")) {
                let roasts = [
                    "🔥 I would roast you but I respect your feelings… just kidding 😈 Your WiFi is faster than your brain 💀😂",
                    "🔥 Your brain is like your WiFi - weak connection!",
                    "🔥 If I had a dollar for every brain cell you have, I'd have $0!",
                    "🔥 You're not stupid, you're just cursed by mediocrity!",
                    "🔥 I'd roast you but my code doesn't support that much stupidity!",
                    "🔥 You're proof that evolution can go in reverse!",
                    "🔥 You're so slow, even Google Maps can't find your brain!",
                    "🔥 Your logic is like broken WiFi — keeps disconnecting 💀", 
                    "🔥 I’ve seen stronger connections between two random WiFi routers than your logic",
                    "🔥 Even my bugs have better teamwork than your ideas",
                    "🔥 You debug by hoping the error gets scared and leaves",
                    "🔥 Your code works the same way as your life plans — sometimes, rarely 💀",
                ];
                return roasts [Math.floor(Math.random() * roasts.length)];
            }

            // SAVAGE button
            if (msg.includes("savage")) {
                let savages = [
                    "😈 Your WiFi is weaker than your excuses!",
                    "😈 You're so basic, even your profile picture judges you!",
                    "😈 You have the right to remain silent because anything you say will be wrong!",
                    "😈 I'd explain it to you, but I left my crayons at home!",
                    "😈 Your code has more bugs than a 90's computer lab!",
                    "😈 If you were any more basic, you'd be a crayon color!",
                    "😈 Even your browser history is embarrassed of you!",
                    "😈 Your mindset is like dial-up in a 5G world!",
                    "😈 You're not a complete idiot, some parts are missing!",
                    "😈 I've seen more life in a dead battery!",
                ];
                return savages[Math.floor(Math.random() * savages.length)];
            }

            // JOKE button
            if (msg.includes("joke") || msg.includes("tell me a joke")) {
                let jokes = [
                    "😂 Programmers hate nature because of bugs 🐞😂",
                    "😂 Why do programmers prefer dark mode? Light attracts bugs!",
                    "😂 Why don't scientists trust atoms? They make up everything!",
                    "😂 What do you call a bear with no teeth? A gummy bear!",
                    "😂 Parallel lines have so much in common… Too bad they never meet!",
                    "😂 I tried to make coffee but I only know JavaScript!",
                    "😂 Why was the computer cold? It left its Windows open!",
                    "😂 What's a computer's favorite beat? An algorithm!",
                    "😂 Why did the programmer quit his job? He didn't get arrays!",
                ];
                return jokes[Math.floor(Math.random() * jokes.length)];
            }

            // HELP button
            if (msg.includes("help me") || msg.includes("help")) {
                return "🆘 **I can help you with:**\n• Math problems (e.g., 2+2, 5*3)\n• Jokes, roasts, savage mode\n• Date and Time\n• Homework (Math, Science, English)\n• General questions about AI, gravity, etc.\n• Just chat with me! 😊";
            }

            // DATE button
            if (msg.includes("date")) {
                let today = new Date();
                let options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                return "📅 Today is " + today.toLocaleDateString('en-US', options);
            }

            // TIME button
            if (msg.includes("time")) {
                let now = new Date();
                return "⏰ Current time is " + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            }

            // Default response
            return "Tell me more 👀 I can tell jokes, roast you, help with homework, or solve math problems!";
        }
    </script>
</body>
</html>
